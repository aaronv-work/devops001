name: My First Workflow

on:
  push:
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "GitHub Actions is working!"
        
      - name: Show date
        run: date
    
      - name: List files
        run: ls
    
      - name: Print message
        run: echo "Learning GitHub Actions"
